# =====================================
# HyprLauncher — Catppuccin Macchiato
# =====================================

[hyprlauncher]
font = JetBrainsMono Nerd Font
font_size = 14
padding = 10
border_radius = 12

[hyprlauncher.colors]
background = #FF0000
background_alt = #1E2030

foreground = #CAD3F5
foreground_alt = #B8C0E0

selection_bg = #363A4F
selection_fg = #CAD3F5

accent = #8AADF4
accent_alt = #7DC4E4

border = #8AADF4
border_focused = #7DC4E4

search_bg = #363A4F
search_fg = #CAD3F5
search_border = #8AADF4

error = #ED8796
warning = #F5A97F

